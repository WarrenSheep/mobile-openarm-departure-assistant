<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="家庭玄关演示场景">
  <rect width="980" height="520" fill="#f5f7f6"/>
  <text x="40" y="42" font-size="24" font-family="Arial, Microsoft YaHei" font-weight="700" fill="#1d2733">家庭玄关演示场景</text>
  <rect x="60" y="86" width="610" height="360" rx="14" fill="#ffffff" stroke="#c7d2cc" stroke-width="2"/>
  <rect x="80" y="320" width="560" height="90" fill="#e9ddd0"/>
  <rect x="90" y="120" width="120" height="220" fill="#d3b999"/><text x="150" y="360" font-family="Arial, Microsoft YaHei" font-size="15" text-anchor="middle">玄关柜</text>
  <rect x="250" y="265" width="180" height="70" rx="10" fill="#dfe8ec" stroke="#6d7d86"/><text x="340" y="306" font-family="Arial, Microsoft YaHei" font-size="16" text-anchor="middle">玄关托盘</text>
  <circle cx="515" cy="235" r="42" fill="#2f6f73"/><rect x="492" y="275" width="46" height="80" rx="20" fill="#2f6f73"/><text x="515" y="376" font-family="Arial, Microsoft YaHei" font-size="15" text-anchor="middle">Mobile OpenARM</text>
  <path d="M548 270 C620 245 625 205 592 180" stroke="#2f6f73" stroke-width="12" fill="none" stroke-linecap="round"/><circle cx="590" cy="178" r="13" fill="#2f6f73"/>
  <g font-family="Arial, Microsoft YaHei" font-size="14" text-anchor="middle">
    <rect x="268" y="278" width="42" height="24" rx="4" fill="#f0c75e"/><text x="289" y="263">钥匙</text>
    <rect x="326" y="280" width="48" height="30" rx="5" fill="#586270"/><text x="350" y="263">钱包</text>
    <rect x="384" y="276" width="26" height="42" rx="6" fill="#222"/><text x="397" y="263">手机</text>
    <line x1="165" y1="145" x2="195" y2="260" stroke="#405b72" stroke-width="6"/><path d="M135 145 Q180 108 225 145" fill="none" stroke="#405b72" stroke-width="5"/><text x="180" y="105">雨伞</text>
  </g>
  <rect x="710" y="95" width="220" height="120" rx="10" fill="#fff" stroke="#8da2b0"/>
  <text x="820" y="126" font-family="Arial, Microsoft YaHei" font-size="17" text-anchor="middle" font-weight="700">天气与交通提醒</text>
  <text x="735" y="160" font-family="Arial, Microsoft YaHei" font-size="14">天气：下雨，建议雨伞</text>
  <text x="735" y="188" font-family="Arial, Microsoft YaHei" font-size="14">交通：拥堵，提前 15 分钟</text>
  <rect x="710" y="250" width="220" height="120" rx="10" fill="#fff" stroke="#8da2b0"/>
  <text x="820" y="281" font-family="Arial, Microsoft YaHei" font-size="17" text-anchor="middle" font-weight="700">用户确认面板</text>
  <text x="735" y="315" font-family="Arial, Microsoft YaHei" font-size="14">最终清单：钥匙、钱包、</text>
  <text x="735" y="343" font-family="Arial, Microsoft YaHei" font-size="14">耳机、雨伞</text>
