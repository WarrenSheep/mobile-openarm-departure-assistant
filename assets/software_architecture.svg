<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="软件架构图">
  <rect width="980" height="420" fill="#f8f7fb"/>
  <text x="40" y="42" font-size="24" font-family="Arial, Microsoft YaHei" font-weight="700" fill="#1d2733">软件分层架构</text>
  <g font-family="Arial, Microsoft YaHei">
    <g fill="#fff" stroke="#5b628f" stroke-width="2">
      <rect x="90" y="80" width="800" height="52" rx="8"/><rect x="90" y="145" width="800" height="52" rx="8"/>
      <rect x="90" y="210" width="800" height="52" rx="8"/><rect x="90" y="275" width="800" height="52" rx="8"/>
      <rect x="90" y="340" width="800" height="52" rx="8"/>
    </g>
    <text x="120" y="113" font-size="17" font-weight="700" fill="#1d2733">用户交互层</text><text x="270" y="113" font-size="14" fill="#506070">清单输入 / 状态反馈 / 用户确认</text>
    <text x="120" y="178" font-size="17" font-weight="700" fill="#1d2733">任务决策层</text><text x="270" y="178" font-size="14" fill="#506070">清单解析 / 推荐决策 / 任务规划 / 异常决策</text>
    <text x="120" y="243" font-size="17" font-weight="700" fill="#1d2733">环境信息层</text><text x="270" y="243" font-size="14" fill="#506070">天气模拟 / 交通模拟 / 日程模拟 / 用户习惯</text>
    <text x="120" y="308" font-size="17" font-weight="700" fill="#1d2733">感知定位层</text><text x="270" y="308" font-size="14" fill="#506070">视觉识别 / 标签确认 / 位置预测 / 坐标转换</text>
    <text x="120" y="373" font-size="17" font-weight="700" fill="#1d2733">机器人执行层</text><text x="270" y="373" font-size="14" fill="#506070">导航 / 搜索 / 抓取 / 放置确认</text>
  </g>
</svg>
